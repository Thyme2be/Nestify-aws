<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Sign In | Nestify</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary-container": "#00ccf9",
            "on-tertiary-fixed": "#410006",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#081b38",
            "on-secondary-container": "#005266",
            "on-background": "#081b38",
            "surface-container": "#e8eeff",
            "surface-variant": "#d7e2ff",
            "surface-container-high": "#dfe8ff",
            "surface-container-highest": "#d7e2ff",
            "on-tertiary": "#ffffff",
            "on-secondary": "#ffffff",
            "primary-container": "#1a2b48",
            "primary": "#031632",
            "on-tertiary-fixed-variant": "#8c1520",
            "error": "#ba1a1a",
            "background": "#f9f9ff",
            "surface-dim": "#cadaff",
            "on-surface-variant": "#44474d",
            "on-secondary-fixed": "#001f28",
            "on-error": "#ffffff",
            "on-primary-fixed-variant": "#374765",
            "on-error-container": "#93000a",
            "tertiary-fixed": "#ffdad8",
            "surface-container-low": "#f1f3ff",
            "secondary": "#00677f",
            "tertiary-fixed-dim": "#ffb3b0",
            "secondary-fixed": "#b7eaff",
            "tertiary-container": "#5e000d",
            "primary-fixed-dim": "#b6c7eb",
            "inverse-surface": "#20304e",
            "on-primary-fixed": "#081b38",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#004e60",
            "on-primary": "#ffffff",
            "surface": "#f9f9ff",
            "tertiary": "#370004",
            "secondary-fixed-dim": "#4cd6ff",
            "outline-variant": "#c5c6ce",
            "inverse-on-surface": "#ecf0ff",
            "outline": "#75777e",
            "inverse-primary": "#b6c7eb",
            "on-tertiary-container": "#f36263",
            "surface-bright": "#f9f9ff",
            "on-primary-container": "#8293b5",
            "surface-tint": "#4e5f7e",
            "primary-fixed": "#d7e2ff"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
  <!-- Solid Background -->
  <div class="fixed inset-0 z-0 bg-surface"></div>
  <!-- Main Content Canvas -->
  <main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-[440px]">
      <!-- Logo Anchor -->
      <div class="text-center mb-12">
        <a href="../nestify_login_screen/code.html" class="flex flex-col items-center no-underline text-inherit">
          <span class="text-6xl font-headline font-black tracking-tighter text-primary">Nestify</span>
        </a>
      </div>
      <!-- Login Card -->
      <div
        class="bg-surface-container-lowest p-10 rounded-xl shadow-[0_40px_80px_-20px_rgba(8,27,56,0.08)] border border-outline-variant/10">
        <header class="mb-8">
          <h2 class="font-headline text-2xl font-bold tracking-tight text-primary">Sign In</h2>
          <p class="text-on-surface-variant text-sm mt-1 font-body">Please sign in to your account</p>
        </header>
        <form class="space-y-6">
          <!-- Email Field -->
          <div class="space-y-2">
            <label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-wider"
              for="email">Email Address</label>
            <div class="relative">
              <input
                class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/30 transition-all outline-none"
                id="email" name="email" placeholder="name@architect.com" type="email" />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label class="block font-label text-xs font-semibold text-primary/70 uppercase tracking-wider"
                for="password">Password</label>
              <a class="text-xs font-semibold text-secondary hover:text-on-secondary-container transition-colors"
                href="#">Forgot Password?</a>
            </div>
            <div class="relative">
              <input
                class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/30 transition-all outline-none"
                id="password" name="password" placeholder="••••••••" type="password" />
              <button
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors"
                type="button">
                <span class="material-symbols-outlined text-xl">visibility</span>
              </button>
            </div>
          </div>
          <!-- Remember Me -->
          <!-- Primary Action -->
          <a href="../personal_profile_clean_sidebar/code.html"
            class="w-full bg-on-tertiary-container text-on-tertiary py-4 rounded-lg font-headline font-bold text-lg shadow-lg shadow-on-tertiary-container/20 hover:scale-[1.01] active:scale-95 transition-all duration-150 flex justify-center items-center group no-underline">
            Sign In
            <span
              class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
          </a>
        </form>
        <!-- Alternative Sign In -->
      </div>
      <!-- Footer Meta -->
      <div class="mt-8 text-center">
        <p class="text-sm text-on-surface-variant">
          Don't have an account?
          <a class="font-bold text-primary hover:text-secondary transition-colors underline underline-offset-4 decoration-secondary/30"
            href="../nestify_registration_screen/code.html">Register</a>
        </p>
      </div>
    </div>
  </main>
  <!-- Shared Footer Logic -->
  <footer class="relative z-10 bg-background py-12 px-12 border-t border-slate-200/10">
    <div class="flex flex-col md:flex-row justify-between items-center w-full max-w-[1440px] mx-auto gap-6">
      <div class="flex flex-col items-center md:items-start gap-2">
        <span class="font-headline font-bold text-primary">Nestify</span>
        <p class="font-body text-xs tracking-wide uppercase text-slate-400">©2026 Nestify. All rights reserved.</p>
      </div>
      <div class="flex items-center gap-8">
        <a class="font-body text-xs tracking-wide uppercase text-slate-400 hover:text-secondary-container transition-colors duration-200"
          href="#">Privacy Policy</a>
        <a class="font-body text-xs tracking-wide uppercase text-slate-400 hover:text-secondary-container transition-colors duration-200"
          href="#">Terms of Service</a>
        <a class="font-body text-xs tracking-wide uppercase text-slate-400 hover:text-secondary-container transition-colors duration-200"
          href="#">Support</a>
      </div>
    </div>
  </footer>
</body>

</html>
