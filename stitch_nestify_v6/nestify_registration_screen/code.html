    <section class="flex-1 flex flex-col bg-surface overflow-y-auto px-6 py-12 md:px-16 lg:px-24 justify-center">
      <div class="w-full max-w-[420px] mx-auto">
        <header class="mb-12">
          <div class="md:hidden mb-12">
            <a href="../nestify_login_screen/code.html" class="no-underline text-inherit">
              <span class="font-headline text-2xl font-extrabold tracking-tighter text-primary">Nestify</span>
            </a>
          </div>
          <p class="font-label text-on-tertiary-container text-xs tracking-widest uppercase font-bold mb-2"></p>
          <h2 class="font-headline text-4xl text-primary font-bold tracking-tight">Create Account</h2>
        </header>
        <form class="space-y-6">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1"
              for="email">Email Address</label>
            <input
              class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary-container/30 transition-all outline-none"
              id="email" name="email" placeholder="elias@architect.com" type="email" />
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1"
              for="password">Password</label>
            <div class="relative">
              <input
                class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary-container/30 transition-all outline-none"
                id="password" name="password" placeholder="••••••••" type="password" />
              <button
                class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
                type="button">
                <span class="material-symbols-outlined text-sm">visibility</span>
              </button>
            </div>
            <p class="mt-2 text-[10px] text-on-surface-variant/60 italic ml-1 leading-tight">Must contain at least 8
              characters including one number and a special symbol.</p>
          </div>
          <div class="flex items-start gap-3 py-2">
            <div class="flex items-center h-5">
              <input
                class="h-4 w-4 rounded border-outline-variant text-on-tertiary-container focus:ring-on-tertiary-container/20"
                id="terms" name="terms" type="checkbox" />
            </div>
            <div class="text-xs text-on-surface-variant leading-relaxed">
              <label class="select-none" for="terms">
                I agree to the <a
                  class="text-primary font-semibold hover:underline decoration-secondary-container underline-offset-4"
                  href="#">Terms of Service</a> and <a
                  class="text-primary font-semibold hover:underline decoration-secondary-container underline-offset-4"
                  href="#">Privacy Intelligence Policy</a>.
              </label>
            </div>
          </div>
          <a href="../personal_profile_clean_sidebar/code.html"
            class="w-full bg-on-tertiary-container text-on-tertiary font-bold py-5 rounded-lg shadow-lg shadow-on-tertiary-container/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-150 tracking-tight text-lg text-center no-underline block">
            Create Account
          </a>
        </form>
        <div class="mt-12 pt-8 border-t border-surface-container-highest">
          <div class="flex items-center justify-between">
            <p class="text-sm text-on-surface-variant">Already have an account?</p>
            <a class="text-sm font-bold text-primary hover:text-secondary transition-colors flex items-center gap-1 group"
              href="../nestify_login_screen/code.html">
              Sign In
              <span
                class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </a>
          </div>
        </div>
        <div class="mt-16 text-center">
          <p class="text-[10px] font-medium tracking-widest text-outline uppercase">Nestify © 2026</p>
        </div>
